<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rainbow Dash Dash</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #gameCanvas { background: #1e272e; border: 2px solid #d2dae2; }
        audio { position: absolute; top: 10px; left: 10px; opacity: 0.5; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop controls preload="auto">
        <source src="Theme Song MLPFIM.wav" type="audio/wav">
    </audio>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const levelData = [100, 150, 200, 250, 350, 390, 500, 550, 700, 900, 1100, 1150, 1200, 1250, 1300];
        let currentDistance = 0;
        let levelIndex = 0;
        let gameover = false;
        let gameWon = false; 

        const playerImg = new Image();
        playerImg.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTXKGzek8erAzbPWYmnMUQbViIW-IZdyIV28xk2_lfwrju0NXvUDrX7_3Xi27NK4nNG_EWBi2vsQTE_g_xc9QJgtcevZTQuJBsz4i1h3jg&s=10";

        const player = { x: 20, y: 340, width: 50, height: 50, dy: 0, gravity: 0.6, jumpStrength: -8, onGround: true };
        const obstacles = [];
        let obstacleSpeed = 5;
        let score = 0;

        function update() {
            if (gameover || gameWon) return;

            currentDistance++;

            if (levelIndex < levelData.length && currentDistance >= levelData[levelIndex]) {
                obstacles.push({ x: canvas.width, y: 350, width: 30, height: 50 });
                levelIndex++;
            }

            if (!player.onGround) player.dy += player.gravity;
            player.y += player.dy;
            if (player.y >= 350) { player.y = 350; player.onGround = true; }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= obstacleSpeed;
                
                if (player.x < obstacles[i].x + 30 && player.x + 50 > obstacles[i].x &&
                    player.y < obstacles[i].y + 50 && player.y + 50 > obstacles[i].y) {
                    gameover = true;
                }

                if (obstacles[i].x + 30 < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    // Check if that was the last obstacle
                    if (score === levelData.length) {
                        gameWon = true;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);
            
            ctx.fillStyle = "#0fbcf9";
            obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.width, o.height));

            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(`Score: ${score} / ${levelData.length}`, 10, 30);

            if (gameover) {
                drawOverlay("GAME OVER", "Press F5 to Try Again", "#ff3f34");
            }

            if (gameWon) {
                drawOverlay("YOU WIN!", "Refresh to start over", "#05c46b");
            }
        }

        function drawOverlay(text, subtext, color) {
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = color;
            ctx.font = "bold 40px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width / 2, 180);
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(subtext, canvas.width / 2, 230);
            ctx.textAlign = "start"; // Reset alignment
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        window.addEventListener("keydown", (e) => {
            if ((e.key === " " || e.key === "ArrowUp") && player.onGround) {
                player.dy = player.jumpStrength;
                player.onGround = false;
                
                const music = document.getElementById("bgMusic");
                if (music.paused) music.play().catch(() => {});
            }
        });

        loop();
    </script>
</body>
</html>
